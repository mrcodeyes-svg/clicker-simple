<html>
  <head>
    <title>hi</title>
  </head>
  <body>
    <p id="count">money: 0</p>
    <button id="button">click</button>
  </body>
  <script>
    const count = document.getElementById("count")
    const click = document.getElementById("button")
    let num = 0

    click.onclick = function() {
      num += 1
      count.innerText = `money: ${num}`
    }
  </script>
</html>
